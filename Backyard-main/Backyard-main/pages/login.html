<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Backyard Food & Drinks</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <div class="navbar-brand">
      <img src="../images/byardslogo.png" alt="Backyards logo" class="navbar-logo"/>
      <div class="navbar-greeting">
        <div class="greeting-hello">Hello!</div>
        <div class="greeting-sub">We are glad to see you :D</div>
      </div>
    </div>
    <a href="home.html" class="btn-nav">Home</a>
  </nav>

  <!-- ── Login Card ── -->
  <main class="login-page">
    <div class="login-card">`

      <div class="login-header">
        <h1> Backyard's Food & Drinks!</h1>
      </div>

      <div class="login-fields">
        <div class="input-group">
          <!-- person icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="7" r="4"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/>
          </svg>
          <input type="text" placeholder="USERNAME" />
        </div>
        <div class="input-group">
          <!-- lock icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" placeholder="PASSWORD" />
        </div>
      </div>

      <div class="login-links">
        <a href="#">Dont have an account?</a>
        <a href="#">Forgot Password?</a>
      </div>

      <a href="home.html" class="btn-primary">LOGIN</a>

    </div>
  </main>

</body>
</html>
